<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Fondo fijo que cubre toda la página */
        body {
            background-image: url('https://images.pexels.com/photos/7381020/pexels-photo-7381020.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
    </style>
</head>

<body class="min-h-screen">

<!-- NAVBAR (fondo blanco semitransparente opcional) -->
<nav class="bg-white/90 backdrop-blur-sm shadow-md">
    <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
        <h1 class="text-xl font-bold text-gray-800">BlogApp</h1>
        <div class="space-x-4">
            <a href="/" class="text-gray-600 hover:text-blue-500">Inicio</a>
            <a href="/login" class="text-gray-600 hover:text-blue-500">Login</a>
        </div>
    </div>
</nav>

<div class="flex items-center justify-center py-16">
    <div class="bg-white/95 backdrop-blur-sm p-10 rounded-2xl shadow-lg w-full max-w-md">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
            Crear cuenta
        </h2>

        <!-- MOSTRAR ERROR -->
        <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 text-center">
            <span th:text="${error}"></span>
        </div>

        <!-- MOSTRAR ÉXITO -->
        <div th:if="${success}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4 text-center">
            <span th:text="${success}"></span>
        </div>

        <form action="/auth/register" method="post" class="space-y-4">
            <div>
                <label class="block text-gray-600 mb-1">Usuario</label>
                <input type="text" name="username"
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                       required>
            </div>

            <div>
                <label class="block text-gray-600 mb-1">Contraseña</label>
                <input type="password" name="password"
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                       required>
            </div>

            <button type="submit"
                    class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition">
                Registrarse
            </button>
        </form>

        <p class="text-center text-gray-500 text-sm mt-4">
            ¿Ya tienes cuenta?
            <a href="/login" class="text-blue-500 hover:underline">Inicia sesión</a>
        </p>
    </div>
</div>

</body>
</html>
