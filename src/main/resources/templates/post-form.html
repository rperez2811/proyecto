<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Crear Post</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-6 rounded-xl shadow w-full max-w-lg">

    <h2 class="text-2xl font-bold mb-6 text-gray-800">
        Crear nuevo post
    </h2>

    <div th:if="${success}" class="mb-4 p-3 bg-green-100 border border-green-400 text-green-700 rounded-lg">
        <span th:text="${success}"></span>
    </div>

    <div th:if="${error}" class="mb-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded-lg">
        <span th:text="${error}"></span>
    </div>

    <div class="mb-4 p-3 bg-yellow-50 border border-yellow-200 text-yellow-800 rounded-lg text-sm">
        <strong>ℹ️ Nota:</strong> Las imágenes serán moderadas automáticamente.
        No se permitirá contenido inapropiado.
    </div>

    <form action="/post/create" method="post" enctype="multipart/form-data" class="space-y-4">

        <input type="hidden" name="blogId" th:value="${blogId}">

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Título *</label>
            <input type="text" name="title"
                   placeholder="Escribe el título de tu post"
                   class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                   required>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Contenido *</label>
            <textarea name="content"
                      placeholder="Escribe el contenido de tu post"
                      class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                      rows="5"
                      required></textarea>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Subir Imagen</label>
            <input type="file" name="imageFile"
                   id="imageFile"
                   accept="image/*"
                   class="w-full border p-2 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"
                   onchange="previewImage()">
            <p class="text-xs text-gray-500 mt-1">La imagen será analizada automáticamente antes de publicarse</p>

            <div id="imagePreview" class="mt-3 hidden">
                <p class="text-sm font-medium text-gray-700 mb-1">Vista previa:</p>
                <img id="preview" src="" alt="Vista previa"
                     class="max-w-full h-auto rounded-lg border border-gray-300 max-h-48 object-contain">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Descripción de la imagen</label>
            <input type="text" name="imageCaption"
                   placeholder="Breve descripción de la imagen (opcional)"
                   class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        </div>

        <div class="flex gap-3 pt-2">
            <button type="submit"
                    class="flex-1 bg-blue-500 text-white py-3 rounded-lg hover:bg-blue-600 transition duration-200 font-medium">
                Publicar
            </button>

            <a th:href="'/blog/' + ${blogId}"
               class="flex-1 bg-gray-300 text-gray-700 py-3 rounded-lg hover:bg-gray-400 transition duration-200 text-center font-medium">
                Cancelar
            </a>
        </div>

    </form>

</div>

<script>
    function previewImage() {
        const fileInput = document.getElementById('imageFile');
        const previewDiv = document.getElementById('imagePreview');
        const previewImg = document.getElementById('preview');

        const file = fileInput.files[0];

        if (file) {
            const reader = new FileReader();

            reader.onload = function(e) {
                previewImg.src = e.target.result;
                previewDiv.classList.remove('hidden');
            }

            reader.readAsDataURL(file);
        } else {
            previewDiv.classList.add('hidden');
        }
    }
</script>

</body>
</html>
