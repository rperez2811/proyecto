<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- NAVBAR -->
<div class="bg-white shadow flex justify-between items-center px-6 py-4">
    <h1 class="text-xl font-bold text-gray-800">Admin Panel</h1>

    <div class="flex items-center space-x-4">
        <span class="text-gray-700">
            Admin: <span th:text="${user.username}"></span>
        </span>

        <a href="/logout"
           class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600">
            Cerrar sesión
        </a>
    </div>
</div>

<div class="flex">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-white h-screen shadow-md p-5">
        <nav class="space-y-4">

            <a href="#"
               class="block bg-blue-500 text-white px-4 py-2 rounded-lg">
                Dashboard
            </a>

            <a href="/admin/users"
               class="block text-gray-700 hover:bg-gray-100 px-4 py-2 rounded-lg">
                Usuarios
            </a>

            <a href="#"
               class="block text-gray-700 hover:bg-gray-100 px-4 py-2 rounded-lg">
                Blogs
            </a>

            <a href="#"
               class="block text-gray-700 hover:bg-gray-100 px-4 py-2 rounded-lg">
                Imágenes
            </a>

        </nav>
    </aside>

    <!-- CONTENIDO -->
    <main class="flex-1 p-6">

        <h2 class="text-2xl font-bold mb-6 text-gray-800">
            Panel de Administración
        </h2>

        <!-- TARJETAS -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

            <div class="bg-white p-6 rounded-xl shadow">
                <h3 class="text-gray-500">Usuarios</h3>
                <p class="text-3xl font-bold text-blue-600">--</p>
            </div>

            <div class="bg-white p-6 rounded-xl shadow">
                <h3 class="text-gray-500">Blogs</h3>
                <p class="text-3xl font-bold text-green-600">--</p>
            </div>

            <div class="bg-white p-6 rounded-xl shadow">
                <h3 class="text-gray-500">Imágenes</h3>
                <p class="text-3xl font-bold text-purple-600">--</p>
            </div>

        </div>



    </main>

</div>

</body>
</html>
