<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Panel Usuario</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 bg-opacity-90">

<main class="flex-1 p-6">

    <!-- MENSAJE -->
    <p th:if="${param.created}"
       class="bg-green-100 text-green-700 p-3 rounded mb-4">
        Blog creado correctamente
    </p>

    <h2 class="text-2xl font-bold mb-6 text-center">
        Panel de usuario
    </h2>

    <!-- NAVBAR -->
    <div class="bg-white shadow flex justify-between items-center px-6 py-4">
        <h1 class="text-xl font-bold text-gray-800">Mi Panel</h1>

        <div class="flex items-center space-x-4">
            <span class="text-gray-700">
                Hola, <span th:text="${user.username}"></span>
            </span>

            <a href="/logout"
               class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600">
                Cerrar sesión
            </a>
        </div>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="max-w-7xl mx-auto mt-10">

        <!-- FORMULARIO CREAR BLOG (cuando no existe) -->
        <div th:if="${blog == null}" class="bg-white p-6 rounded-xl shadow max-w-3xl mx-auto">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">
                Crear nuevo Blog
            </h2>

            <form action="/blog/create" method="post" class="space-y-4">
                <input type="text" name="name" placeholder="Nombre del blog"
                       class="w-full border p-3 rounded-lg" required>

                <textarea name="description" placeholder="Descripción"
                          class="w-full border p-3 rounded-lg" required></textarea>

                <button type="submit"
                        class="w-full bg-blue-500 text-white py-3 rounded-lg">
                    Crear blog
                </button>
            </form>
        </div>

        <!-- CONTENIDO CUANDO EL BLOG EXISTE -->
        <div th:if="${blog != null}" class="flex gap-6">

            <!-- SIDEBAR -->
            <aside class="w-64 bg-white p-4 rounded-xl shadow">
                <h3 class="font-bold mb-4">Menú</h3>
                <a th:href="@{/user(view='posts')}"
                   class="block text-blue-500 hover:underline">
                    Ver entradas
                </a>
            </aside>

            <!-- CONTENIDO PRINCIPAL DEL BLOG -->
            <div class="flex-1">

                <!-- INFO DEL BLOG -->
                <div class="bg-white p-6 rounded-xl shadow mb-6">
                    <h2 class="text-2xl font-bold mb-4 text-gray-800">
                        Tu Blog
                    </h2>
                    <p class="text-gray-600 mb-4">
                        <strong th:text="${blog.name}"></strong>
                    </p>
                    <div class="flex gap-4">
                        <a th:href="@{'/blog/' + ${blog.id}}"
                           class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600">
                            Ver blog
                        </a>
                        <a th:href="@{/post/new(blogId=${blog.id})}"
                           class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600">
                            Crear entrada
                        </a>
                    </div>
                </div>

                <!-- SECCIÓN DE ENTRADAS (view='posts') -->
                <div th:if="${view == 'posts'}" class="bg-white p-6 rounded-xl shadow">
                    <h2 class="text-xl font-bold mb-4">
                        Mis entradas
                    </h2>

                    <p th:if="${posts == null or #lists.isEmpty(posts)}"
                       class="text-gray-500">
                        No tienes entradas aún
                    </p>

                    <!-- LISTA DE ENTRADAS -->
                    <div th:each="post : ${posts}"
                         class="flex justify-between items-center border-b py-3">
                        <div>
                            <p class="font-semibold" th:text="${post.title}"></p>
                            <p class="text-sm text-gray-500"
                               th:text="${#temporals.format(post.createdAt, 'dd/MM/yyyy HH:mm')}">
                            </p>
                        </div>

                        <form action="/post/delete" method="post">
                            <input type="hidden" name="postId" th:value="${post.id}">
                            <input type="hidden" name="blogId" th:value="${blog.id}">
                            <button type="submit"
                                    class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600">
                                Eliminar
                            </button>
                        </form>
                    </div>

                    <!-- PAGINACIÓN -->
                    <div class="flex justify-center mt-8"
                         th:if="${totalPages > 1}">
                        <div class="flex items-center gap-1 bg-white shadow px-4 py-2 rounded-xl">
                            <a th:if="${currentPage > 0}"
                               th:href="@{/user(view='posts', page=${currentPage - 1})}"
                               class="px-3 py-1 rounded-lg hover:bg-gray-200">
                                ←
                            </a>

                            <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                                <a th:href="@{/user(view='posts', page=${i})}"
                                   th:text="${i + 1}"
                                   class="px-3 py-1 rounded-lg"
                                   th:classappend="${i == currentPage}
                                       ? 'bg-blue-500 text-white font-semibold'
                                       : 'hover:bg-gray-200'">
                                </a>
                            </span>

                            <a th:if="${currentPage < totalPages - 1}"
                               th:href="@{/user(view='posts', page=${currentPage + 1})}"
                               class="px-3 py-1 rounded-lg hover:bg-gray-200">
                                →
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
